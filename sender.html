
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Birthday Surprise</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Poppins',sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#ff758c,#ff7eb3,#fad0c4);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:900px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(15px);
      padding:40px;
      border-radius:30px;
      text-align:center;
      box-shadow:0 15px 35px rgba(0,0,0,0.25);
    }

    h1{
      font-size:2.8rem;
      margin-bottom:20px;
    }

    .upload-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-top:30px;
    }

    .upload-box{
      background:rgba(255,255,255,0.15);
      padding:20px;
      border-radius:20px;
    }

    input{
      margin-top:15px;
      width:100%;
      padding:12px;
      border-radius:10px;
      border:none;
    }

    img{
      width:100%;
      max-height:300px;
      object-fit:cover;
      border-radius:15px;
      margin-top:15px;
      display:none;
    }

    button{
      margin-top:25px;
      padding:15px 30px;
      border:none;
      border-radius:50px;
      background:linear-gradient(45deg,#ff416c,#ff4b2b);
      color:white;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
    }

    .share-box{
      margin-top:30px;
      display:none;
    }

    .share-box button{
      margin:10px;
    }

    @media(max-width:768px){
      .upload-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎁 Create Birthday Surprise 🎁</h1>
  <p>Upload Birthday Person’s Photos / Favorite Pics 💖</p>

  <div class="upload-grid">

    <!-- Left Photo -->
    <div class="upload-box">
      <h3>📸 Upload Left Photo</h3>
      <input type="file" id="leftUpload" accept="image/*">
      <img id="leftPreview">
    </div>

    <!-- Right Photo -->
    <div class="upload-box">
      <h3>📸 Upload Right Photo</h3>
      <input type="file" id="rightUpload" accept="image/*">
      <img id="rightPreview">
    </div>

  </div>

  <button onclick="generateLink()">🎉 Send To Birthday Person 🎉</button>

  <div class="share-box" id="shareBox">
    <h3>Your Surprise Link is Ready 💝</h3>
    <button onclick="copyLink()">📋 Copy Link</button>
    <button onclick="shareWhatsApp()">🟢 WhatsApp</button>
    <button onclick="shareMore()">📤 More</button>
  </div>
</div>

<script>
let birthdayLink = "";

function handleImage(inputId, previewId, storageKey){
  document.getElementById(inputId).addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(){
      const imageData = reader.result;

      document.getElementById(previewId).src = imageData;
      document.getElementById(previewId).style.display = "block";

      localStorage.setItem(storageKey, imageData);
    };

    reader.readAsDataURL(file);
  });
}

handleImage("leftUpload","leftPreview","birthdayLeftImage");
handleImage("rightUpload","rightPreview","birthdayRightImage");

function generateLink(){
  birthdayLink = window.location.origin + window.location.pathname.replace("sender.html","birthday.html");

  document.getElementById("shareBox").style.display = "block";
}

function copyLink(){
  navigator.clipboard.writeText(birthdayLink);
  alert("Birthday Link Copied!");
}

function shareWhatsApp(){
  window.open(`https://wa.me/?text=${encodeURIComponent("🎉 Open Your Birthday Surprise 🎁 " + birthdayLink)}`);
}

function shareMore(){
  if(navigator.share){
    navigator.share({
      title:"Birthday Surprise",
      text:"🎉 Open Your Birthday Surprise 🎁",
      url:birthdayLink
    });
  } else {
    copyLink();
  }
}
</script>

</body>
</html>
